services:
  mongo:
    image: mongo:7
    container_name: politicalnews-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # WebApp is the one admin site/read API/Hangfire dashboard - it never executes a crawl job
  # itself. RssService and ApiService (below) are the two headless workers that actually own
  # Hangfire job execution, split into independently deployable/scalable processes so one
  # pipeline's job volume can never starve the other's small Hangfire WorkerCount. All three point
  # at the same Mongo below.
  webapp:
    build:
      context: .
      dockerfile: Dockerfile.WebApp
    container_name: politicalnews-webapp
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "8080:8080"
    environment:
      DOTNET_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:8080"
      MongoDb__ConnectionString: "mongodb://mongo:27017"
      MongoDb__DatabaseName: "PoliticalNewsDb"

  rssservice:
    build:
      context: .
      dockerfile: Dockerfile.RssService
    container_name: politicalnews-rssservice
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "8081:8080"
    environment:
      DOTNET_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:8080"
      MongoDb__ConnectionString: "mongodb://mongo:27017"
      MongoDb__DatabaseName: "PoliticalNewsDb"

  apiservice:
    build:
      context: .
      dockerfile: Dockerfile.ApiService
    container_name: politicalnews-apiservice
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "8082:8080"
    environment:
      DOTNET_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:8080"
      MongoDb__ConnectionString: "mongodb://mongo:27017"
      MongoDb__DatabaseName: "PoliticalNewsDb"

volumes:
  mongo-data:
