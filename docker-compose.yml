services:
  mongo:
    image: mongo:7
    container_name: politicalnews-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # Web owns both the HTTP API and Hangfire job execution (RSS/API crawl schedules) - there is no
  # separate worker service anymore, retired so this app fits a free-tier host with no paid
  # background-worker service required.
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: politicalnews-web
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "8080:8080"
    environment:
      DOTNET_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:8080"
      MongoDb__ConnectionString: "mongodb://mongo:27017"
      MongoDb__DatabaseName: "PoliticalNewsDb"

volumes:
  mongo-data:
