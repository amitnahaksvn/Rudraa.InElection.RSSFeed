# Render Blueprint. Deploy via Render Dashboard -> New -> Blueprint, pointing at this repo.
#
# Single service by design: Web now owns both the HTTP API and Hangfire job execution (every
# RSS/JSON-API crawl schedule) - there is no separate Worker service anymore. That merge exists
# specifically so this app fits Render's free tier: Background Workers require a paid plan with no
# free option at all, while a free Web Service is available (with the platform's usual spin-down
# after ~15 minutes of no inbound HTTP traffic - an external keep-alive ping, e.g. a free uptime
# monitor hitting /health every ~10 minutes, is needed to keep Hangfire's in-process scheduler
# actually firing on schedule; see git history/CLAUDE.md for the two-process paid-tier version if
# reliability without a pinger ever matters more than cost).
#
# No secrets are declared here on purpose: src/Web/appsettings.json carries a real
# MongoDb:ConnectionString, every NewsApiKeys:* value, and Email:ApiKey baked directly into the
# committed file (development-tier credentials, kept in appsettings.json by deliberate choice
# rather than user-secrets), so the container works with zero Render environment variables
# configured, matching how it already runs today.
services:
  - type: web
    name: rudraa-inelection-rssfeed-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DOTNET_ENVIRONMENT
        value: Production
      # TLS terminates at Render's edge; the container only ever sees plain HTTP (see
      # Web/Program.cs's UseHttpsRedirection comment) - matches docker-compose.yml's web service.
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: Api__EnableHangfireDashboard
        value: "false"
