<!--
  Shared outer shell for every monitoring email (error-log batch/warning/information/success).
  This is the one file to edit for branding/style changes (colors, fonts, footer copy, logo) -
  EmailTemplateBuilder.cs only fills in the placeholders below and generates the dynamic inner
  content (tables/detail sections), it never hardcodes chrome. Copied to the output directory as-is
  (see Infrastructure.csproj) and reloaded from disk on every send, so editing this file takes
  effect on the next email without recompiling anything.

  Deliberately a light, low-contrast palette throughout (light header, soft tinted badges/icon
  instead of a solid near-black header with a saturated icon fill) - readable and clearly
  color-coded by severity without being visually loud.

  Placeholders (replaced verbatim, case-sensitive):
    {{AccentColor}}     - hex color for the top bar / icon outline / section accents (severity color)
    {{AccentColorSoft}} - pale tint of AccentColor used for subtle backgrounds
    {{Icon}}            - single emoji shown in the header badge
    {{HeaderTitle}}      - already HTML-encoded by the caller
    {{HeaderSubtitle}}   - already HTML-encoded by the caller; the small badge row under the title
    {{Body}}            - raw HTML, the dynamic content generated by EmailTemplateBuilder.cs
    {{FooterNote}}       - already HTML-encoded by the caller
-->
<!doctype html>
<html>
<body style="margin:0;padding:0;background:#eef1f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" style="border-collapse:collapse;background:#eef1f5;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" style="width:100%;max-width:680px;border-collapse:collapse;background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(16,24,40,0.08);">

          <!-- severity accent bar -->
          <tr><td style="height:4px;background:{{AccentColor}};line-height:0;font-size:0;">&nbsp;</td></tr>

          <!-- header -->
          <tr>
            <td style="background:#f9fafb;padding:22px 28px;border-bottom:1px solid #eef0f2;">
              <table role="presentation" style="border-collapse:collapse;">
                <tr>
                  <td style="width:44px;vertical-align:top;">
                    <div style="width:36px;height:36px;border-radius:50%;background:{{AccentColorSoft}};border:1px solid {{AccentColor}};text-align:center;line-height:36px;font-size:16px;">{{Icon}}</div>
                  </td>
                  <td style="vertical-align:top;padding-left:10px;">
                    <div style="font-size:16px;font-weight:700;color:#111827;letter-spacing:0.2px;">{{HeaderTitle}}</div>
                    <div style="margin-top:6px;">{{HeaderSubtitle}}</div>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- dynamic body -->
          <tr>
            <td style="padding:24px 28px;background:#ffffff;">
              {{Body}}
            </td>
          </tr>

          <!-- footer -->
          <tr>
            <td style="padding:16px 28px;background:#f9fafb;border-top:1px solid #eef0f2;">
              <p style="margin:0;font-size:11px;color:#9aa1ab;line-height:1.6;">{{FooterNote}}</p>
              <p style="margin:4px 0 0;font-size:11px;color:#c2c7cf;">InElection Monitoring &middot; automated alert, do not reply.</p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
