name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  dotnet:
    name: Build & test (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.100"
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            **/*.csproj

      - name: Restore
        run: dotnet restore Rudraa.InElection.Feed.slnx

      - name: Build
        run: dotnet build Rudraa.InElection.Feed.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test tests/PoliticalNews.Tests/PoliticalNews.Tests.csproj --configuration Release --logger "trx;LogFileName=test-results.trx"

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results
          path: tests/PoliticalNews.Tests/TestResults/test-results.trx

  clientapp:
    name: Build (error-monitor React app)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/WebApp/ClientApp
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/WebApp/ClientApp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
