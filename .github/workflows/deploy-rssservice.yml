name: Deploy RssService to Azure

on:
  push:
    branches: [main]
    # Only this service's own code plus the shared layers it actually references
    # (Application/Domain/Infrastructure/ServiceDefaults/WebPlatform, per RssService.csproj's
    # ProjectReferences) and the RSS-only config it links - a change scoped to WebApp/ApiService's
    # own folder doesn't touch anything RssService actually ships, so it shouldn't redeploy this app.
    paths:
      - "src/RssService/**"
      - "src/WebPlatform/**"
      - "src/Application/**"
      - "src/Domain/**"
      - "src/Infrastructure/**"
      - "src/ServiceDefaults/**"
      - "src/Countries.Rss/**"
      - "src/WebRssFeed.appsettings.json"
      - ".github/workflows/deploy-rssservice.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.100"

      - name: Publish
        run: dotnet publish src/RssService/RssService.csproj -c Release -o ${{ github.workspace }}/publish/rssservice

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: rudraa-rssservice
          publish-profile: ${{ secrets.AZURE_RSSSERVICE_PUBLISH_PROFILE }}
          package: ${{ github.workspace }}/publish/rssservice
