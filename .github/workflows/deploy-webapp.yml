name: Deploy WebApp to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/WebApp/ClientApp/package-lock.json

      - name: Build ClientApp
        working-directory: src/WebApp/ClientApp
        run: |
          npm ci
          npm run build

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.100"

      - name: Publish
        run: dotnet publish src/WebApp/WebApp.csproj -c Release -o ${{ github.workspace }}/publish/webapp

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: rudraa-webapp
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ github.workspace }}/publish/webapp
