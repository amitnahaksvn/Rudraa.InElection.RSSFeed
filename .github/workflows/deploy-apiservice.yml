name: Deploy ApiService to Azure

on:
  push:
    branches: [main]
    # Only this service's own code plus the shared layers it actually references
    # (Application/Domain/Infrastructure/ServiceDefaults/WebPlatform, per ApiService.csproj's
    # ProjectReferences) and the API-only config it links - a change scoped to WebApp/RssService's
    # own folder doesn't touch anything ApiService actually ships, so it shouldn't redeploy this app.
    paths:
      - "src/ApiService/**"
      - "src/WebPlatform/**"
      - "src/Application/**"
      - "src/Domain/**"
      - "src/Infrastructure/**"
      - "src/ServiceDefaults/**"
      - "src/Countries.Api/**"
      - "src/WebApiFeed.appsettings.json"
      - ".github/workflows/deploy-apiservice.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.100"

      - name: Publish
        run: dotnet publish src/ApiService/ApiService.csproj -c Release -o ${{ github.workspace }}/publish/apiservice

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: rudraa-apiservice
          publish-profile: ${{ secrets.AZURE_APISERVICE_PUBLISH_PROFILE }}
          package: ${{ github.workspace }}/publish/apiservice
